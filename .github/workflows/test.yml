name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Forbid Bun-only API in src/ (ships as Node binary)
        run: |
          if grep -rn '\bBun\.' src/; then
            echo "Found Bun-only API in src/. Use node: built-ins instead." >&2
            exit 1
          fi

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
